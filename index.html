function fmtT(ms){
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if(h > 0) return h + 'h ' + (m % 60) + 'm';
  if(m > 0) return m + 'm ' + (s % 60) + 's';
  return s + 's';
}
function fmtTs(ms){
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if(h > 0) return String(h).padStart(2,'0') + ':' + String(m % 60).padStart(2,'0') + 'h';
  return String(m).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
}
function fmtClock(d){ return d.toLocaleTimeString('pt-BR'); }

function toast(msg, type, dur){
  type = type || 'ok';
  dur = dur || 3500;
  const tw = el('tw');
  if(!tw) return;
  const e = document.createElement('div');
  e.className = 'toast t-' + type;
  e.textContent = msg;
  tw.appendChild(e);
  requestAnimationFrame(() => requestAnimationFrame(() => e.classList.add('show')));
  setTimeout(() => {
    e.classList.remove('show');
    setTimeout(() => e.remove(), 300);
  }, dur);
}

function ov(show){
  const o = el('ov');
  if(o) o.classList.toggle('h', !show);
}

function openM(id){ const x = el(id); if(x) x.classList.add('open'); }
function closeM(id){ const x = el(id); if(x) x.classList.remove('open'); }

function prioBadge(p){
  if(!p || p === 'normal') return '';

}

// ── VOZ ──
var _vozNome = localStorage.getItem('pf_voz') || '';
var _vozRate = parseFloat(localStorage.getItem('pf_rate') || '0.95');
var _vozPitch = parseFloat(localStorage.getItem('pf_pitch') || '1');

function narrar(texto){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(texto);
  u.lang = 'pt-BR';
  u.rate = _vozRate;
  u.pitch = _vozPitch;
  u.volume = 1;
  var vozes = window.speechSynthesis.getVoices();
  var voz = null;
  if(_vozNome) voz = vozes.find(v => v.name === _vozNome);
  if(!voz) voz = vozes.find(v => v.lang === 'pt-BR' || v.lang.startsWith('pt'));
  if(voz) u.voice = voz;
  window.speechSynthesis.speak(u);
}

function carregarVozes(){
  var sel = el('cfg-voz');
  if(!sel) return;
  var vozes = window.speechSynthesis.getVoices();
  sel.innerHTML = vozes.map(v => {
    var sel2 = v.name === _vozNome ? ' selected' : '';
    return '<option value="' + v.name + '"' + sel2 + '>' + v.name + ' (' + v.lang + ')</option>';
  }).join('');
  if(!sel.value && vozes.length) sel.value = vozes[0].name;
}

function previewVoz(){ testarVoz(); }

function testarVoz(){
  _vozNome = el('cfg-voz') ? el('cfg-voz').value : _vozNome;
  _vozRate = el('cfg-rate') ? parseFloat(el('cfg-rate').value) : _vozRate;

  toast('Voz configurada: ' + _vozNome, 'ok');
}

function startRealtime(){
  if(_ch) sb.removeChannel(_ch);

  _ch = sb
    .channel('pedidos-rt')
    .on('postgres_changes', { event:'*', schema:'public', table:'pedidos' }, function(payload){
      if(payload.eventType === 'INSERT'){
        PEDIDOS.push(payload.new);
      }else if(payload.eventType === 'UPDATE'){
        var idx = PEDIDOS.findIndex(p => p.id === payload.new.id);
        var old = idx >= 0 ? PEDIDOS[idx] : null;
        if(idx >= 0) PEDIDOS[idx] = payload.new;
        else PEDIDOS.push(payload.new);

        if(payload.new.status === 'aguardando' && (!old || old.status !== 'aguardando')){
          var dest = payload.new.setor_pendente;
          var _ms = ME ? ME.setor : '';
          var ehMeu = ME && (
            ME.role === 'admin' ||
            _ms === 'todos' ||
            _ms === dest ||
            _ms === 'atendimento' ||
            (_ms === 'separacao' && dest === 'retirada')
          );
          if(ehMeu){
            toast('Pedido #' + payload.new.numero + ' aguardando confirmação em ' + (SL[dest] || dest) + '!', 'warn', 6000);
          }
        }
      }else if(payload.eventType === 'DELETE'){
        PEDIDOS = PEDIDOS.filter(p => p.id !== payload.old.id);
      }

      const sid = currentScreenId();
      if(sid === 'screen-painel') renderPainel();
      if(sid === 'screen-tv') renderTV();
    })
    .subscribe();
}

async function fetchPedidos(){
  var hoje = new Date();
  hoje.setHours(0,0,0,0);

  var res = await sb
    .from('pedidos')
    .select('*')
    .or('entrada_at.gte.' + hoje.toISOString() + ',status.eq.em_andamento,status.eq.aguardando,status.eq.faturado')
    .order('entrada_at', { ascending:false });

  if(res.error){
    res = await sb
      .from('pedidos')
      .select('*')
      .or('entrada_em.gte.' + hoje.toISOString() + ',status.eq.em_andamento,status.eq.aguardando,status.eq.faturado')
      .order('entrada_em', { ascending:false });
  }

  handleSbError(res, 'Erro ao carregar pedidos');
  PEDIDOS = res.data || [];
  return PEDIDOS;
}

      t.classList.add('active');

  });

    if(name === 'painel'){
      ov(true);
      await fetchPedidos();
      renderPainel();
    }
    if(name === 'tv'){
      ov(true);

      renderTV();
    }

      ov(true);

function startClock(){
  if(_ti) clearInterval(_ti);

  _ti = setInterval(function(){
    if(el('tv-clock')) el('tv-clock').textContent = fmtClock(new Date());
    setPanelDate();

    const sid = currentScreenId();
    if(sid === 'screen-painel') renderPainel();
    if(sid === 'screen-tv') renderTV();

    PEDIDOS.forEach(function(o){
      const pend = o.pendente_desde || o.cara_desde || o.aguarda_desde || null;
      if(o.status !== 'aguardando' || !pend) return;
      var ms = now() - tsMs(pend);
      var k = 'alr10_' + o.id;
      if(ms > 10 * 60000 && !sessionStorage.getItem(k)){
        sessionStorage.setItem(k,'1');
        toast('Pedido #' + o.numero + ' aguarda confirmação há +10min!', 'err', 7000);
      }
    });
  }, 1000);
}

function campoEntrada(o){ return o.entrada_at || o.entrada_em || null; }
function campoSetorEntrada(o){ return o.setor_entrada_at || o.setor_entrada_em || null; }
function campoPendente(o){ return o.pendente_desde || o.cara_desde || o.aguardando_desde || null; }
function campoFinalizado(o){ return o.finalizado_at || o.finalizado_em || null; }
function campoTempoConfirmacao(m){ return m.tempo_confirmacao_ms || m.tempo_conf || 0; }

function renderPainel(){
  setPanelDate();

  if(ME && ME.setor && ME.setor !== 'todos'){
    el('setor-badge').textContent = 'Seu setor: ' + (SL[ME.setor] || ME.setor);
    el('setor-badge').style.display = '';
  }else{
    el('setor-badge').style.display = 'none';
  }

  var allCols = SETORES.concat(['retirada']);

  el('kanban').innerHTML = allCols.map(function(setor){
    var items = PEDIDOS.filter(o => o.setor === setor && o.status !== 'finalizado' && o.status !== 'aguardando');
    var chegando = PEDIDOS.filter(o => o.status === 'aguardando' && o.setor_pendente === setor);

    return '<div class="kc">' +
      '<div class="ch">' +
        '<div class="cdot" style="background:' + (SD[setor] || 'rgba(240,239,232,.3)') + '"></div>' +
        '<span class="cn">' + SL[setor] + '</span>' +
        '<span class="cc">' + (items.length + chegando.length) + (chegando.length ? ' (' + chegando.length + '⌛)' : '') + '</span>' +
      '</div>' +
      chegando.map(renderTransCard).join('') +
      items.map(function(o){ return renderCard(o, setor); }).join('') +
      '</div>';
  }).join('');
}

function renderTransCard(o){
  var pend = campoPendente(o);
  var elapsed = now() - tsMs(pend);
  var alerta = elapsed > ALERT_MS;
  var dest = o.setor_pendente || '';
  var _ms = ME ? ME.setor : '';
  var canC = ME && (ME.role === 'admin' || _ms === 'todos' || _ms === dest || (_ms === 'separacao' && dest === 'retirada'));
  var prio = o.prioridade || 'normal';
  var pC = prio === 'idoso' ? 'prio-idoso' : prio === 'gestante' ? 'prio-gestante' : '';
  var sC = alerta ? 'cd' : elapsed > 3 * 60000 ? 'cw' : '';

  return '<div class="card transito ' + pC + ' ' + sC + '">' +
    '<div class="tlbl"><span class="dp"></span>' + (alerta ? 'Aguardando há ' : 'Aguard. confirmação há ') + fmtT(elapsed) + '</div>' +
    '<div class="card-top"><span class="card-num">#' + o.numero + '</span>' + prioBadge(prio) + '</div>' +
    (o.nome_cliente ? '<div class="card-cli">' + o.nome_cliente + '</div>' : '') +
    '<div class="card-meta">De: ' + (SL[o.setor] || o.setor) + '</div>' +
    '<div class="ca">' +
      (canC
        ? '<button class="bcon" onclick="confirmarRec(\'' + o.id + '\')">✓ Confirmar Recebimento</button>'
        : '<span style="font-size:11px;color:var(--muted)">Aguardando operador do setor</span>'
      ) +
    '</div>' +
  '</div>';
}

function renderCard(o, setor){
  var totalMs = now() - tsMs(campoEntrada(o));
  var setorMs = now() - tsMs(campoSetorEntrada(o));
  var tC = totalMs > 45 * 60000 ? 'danger' : totalMs > 25 * 60000 ? 'warn' : '';
  var prio = o.prioridade || 'normal';
  var pC = prio === 'idoso' ? 'prio-idoso' : prio === 'gestante' ? 'prio-gestante' : '';
  var hora = tsMs(campoEntrada(o))
    ? new Date(tsMs(campoEntrada(o))).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
    : '--';

  var idx = SETORES.indexOf(setor);
  var _s = ME ? ME.setor : '';
  var canAct = ME && (ME.role === 'admin' || _s === 'todos' || _s === setor);
  var canFat = ME && (ME.role === 'admin' || _s === 'todos' || _s === 'faturamento' || _s === 'atendimento');
  var canRet = ME && (ME.role === 'admin' || _s === 'todos' || _s === 'separacao');

  var actions = '';
  var btnRet = '';

  if(setor === 'faturamento' && canFat){
    actions = '<button class="bfin" onclick="openNota(\'' + o.id + '\')">Faturar →</button>';
  }else if(setor === 'retirada' && canRet){
    actions = '<button class="bfin" onclick="finalizarPedido(\'' + o.id + '\')">Retirado ✓</button>';
  }else if(idx >= 0 && idx < SETORES.length - 1 && canAct){
    actions = '<button class="bmv" onclick="enviar(\'' + o.id + '\',\'' + SETORES[idx+1] + '\')">→ ' + SL[SETORES[idx+1]] + '</button>';
  }

  if(idx > 0 && canAct){
    btnRet = '<button class="bret" onclick="retornarPedido(\'' + o.id + '\')">← Retornar</button>';
  }

  return '<div class="card ' + pC + '">' +
    '<div class="card-top"><span class="card-num">#' + o.numero + '</span>' + prioBadge(prio) + '</div>' +
    (o.nome_cliente ? '<div class="card-cli">' + o.nome_cliente + '</div>' : '') +
    '<div class="card-meta">Entrada: ' + hora + ' · Por: ' + (o.criado_por || '—') + '</div>' +
    (o.num_nota ? '<div class="card-nota">NF: ' + o.num_nota + '</div>' : '') +
    '<div class="ct">' +
      '<div class="ti"><span class="tl">Neste setor</span><span class="tv ' + tC + '">' + fmtT(setorMs) + '</span></div>' +
      '<div class="ti"><span class="tl">Total</span><span class="tv ' + tC + '">' + fmtT(totalMs) + '</span></div>' +
    '</div>' +
    ((actions || btnRet) ? '<div class="ca">' + actions + btnRet + '</div>' : '') +
  '</div>';
}

async function retornarPedido(id){
  if(!confirm('Retornar este pedido ao setor anterior?')) return;

  ov(true);
  try{
    var o = PEDIDOS.find(p => p.id === id);
    if(!o) throw new Error('Pedido não encontrado');

    var idx = SETORES.indexOf(o.setor);
    if(idx <= 0){
      toast('Este pedido já está no primeiro setor.', 'err');
      return;
    }

    var setorAnterior = SETORES[idx - 1];
    var agora = new Date().toISOString();

    var payload = {
      setor: setorAnterior,
      setor_pendente: '',
      status: 'em_andamento',
      pendente_desde: null,
      cara_desde: null
    };
    if('setor_entrada_at' in o) payload.setor_entrada_at = agora;
    else payload.setor_entrada_em = agora;

    var res = await sb.from('pedidos').update(payload).eq('id', id);
    handleSbError(res, 'Erro ao retornar pedido');

    toast('Pedido retornado para ' + SL[setorAnterior] + '.', 'warn');
  }catch(e){
    console.error(e);
    toast(e.message, 'err');
  }finally{
    ov(false);
  }
}

async function enviar(id, destino){
  ov(true);
  try{
    var o = PEDIDOS.find(p => p.id === id);
    var agora = new Date().toISOString();
    var payload = {
      setor_pendente: destino,
      status: 'aguardando'
    };
    if(o && 'pendente_desde' in o) payload.pendente_desde = agora;
    else payload.cara_desde = agora;

    var res = await sb.from('pedidos').update(payload).eq('id', id);
    handleSbError(res, 'Erro ao enviar pedido');

    toast('Pedido enviado para ' + (SL[destino] || destino) + '. Aguardando confirmação.', 'move');
  }catch(e){
    console.error(e);
    toast(e.message, 'err');
  }finally{
    ov(false);
  }
}

async function confirmarRec(id){
  ov(true);
  try{
    var o = PEDIDOS.find(p => p.id === id);
    if(!o) throw new Error('Pedido não encontrado');

    var agora = new Date().toISOString();
    var dtEntrada = campoSetorEntrada(o);
    var dtPend = campoPendente(o);
    var tempoSetor = tsMs(dtPend) - tsMs(dtEntrada);
    var tempoConf = tsMs(agora) - tsMs(dtPend);
    var dest = o.setor_pendente;

    var payload = {
      setor: dest,
      setor_pendente: '',
      status: dest === 'retirada' ? 'faturado' : 'em_andamento',
      pendente_desde: null,
      cara_desde: null
    };
    if('setor_entrada_at' in o) payload.setor_entrada_at = agora;
    else payload.setor_entrada_em = agora;

    var res = await sb.from('pedidos').update(payload).eq('id', id);
    handleSbError(res, 'Erro ao confirmar recebimento');

    const movPayload = {
      pedido_id: id,
      setor_origem: o.setor,
      setor_destino: dest,
      usuario: ME.login,
      tempo_ms: tempoSetor,
      confirmado_por: ME.login,
      tempo_confirmacao_ms: tempoConf,
      tempo_conf: tempoConf,
      entrada_em: dtEntrada,
      saida_em: agora,
      confirmado_em: agora
    };

    await sb.from('movimentacoes').insert(movPayload);

    await sb.from('confirmacoes').insert({
      pedido_id:id,
      setor_origem:o.setor,
      setor_destino:dest,
      enviado_at:dtPend,
      confirmado_at:agora,
      tempo_confirmacao_ms:tempoConf,
      tempo_conf:tempoConf,
      confirmado_por:ME.login
    });

    toast('Recebimento confirmado em ' + (SL[dest] || dest), 'ok');

    if(dest === 'retirada'){
      narrar('Pedido ' + o.numero + ', por favor dirija-se ao balcão para retirar sua mercadoria.');
    }else{
      narrar('Pedido ' + o.numero + ' recebido pelo setor de ' + (SL[dest] || dest) + '.');
    }
  }catch(e){
    console.error(e);
    toast(e.message, 'err');
  }finally{
    ov(false);
  }
}

function openNota(id){
  _notaTarget = id;
  el('nota-num').value = '';
  openM('m-nota');
}

async function confirmarNota(){
  var nota = el('nota-num').value.trim();
  if(!nota){
    toast('Informe o número da nota fiscal.', 'err');
    return;
  }

  closeM('m-nota');
  ov(true);

  try{
    var o = PEDIDOS.find(p => p.id === _notaTarget);
    var agora = new Date().toISOString();
    var payload = {
      setor_pendente:'retirada',
      status:'aguardando',
      num_nota:nota
    };
    if(o && 'pendente_desde' in o) payload.pendente_desde = agora;
    else payload.cara_desde = agora;

    var res = await sb.from('pedidos').update(payload).eq('id', _notaTarget);
    handleSbError(res, 'Erro ao faturar pedido');

    toast('Faturado! NF ' + nota + '. Enviado para retirada.', 'move');
  }catch(e){
    console.error(e);
    toast(e.message, 'err');
  }finally{
    ov(false);
    _notaTarget = null;
  }
}

async function finalizarPedido(id){
  ov(true);
  try{
    var o = PEDIDOS.find(p => p.id === id);
    if(!o) throw new Error('Pedido não encontrado');

    var agora = new Date().toISOString();
    var tempoMs = tsMs(agora) - tsMs(campoSetorEntrada(o));

    var payload = {
      setor:'finalizado',
      status:'finalizado'
    };
    if('finalizado_at' in o) payload.finalizado_at = agora;
    else payload.finalizado_em = agora;

    var res = await sb.from('pedidos').update(payload).eq('id', id);
    handleSbError(res, 'Erro ao finalizar pedido');

    const movPayload = {
      pedido_id:id,
      setor_origem:o.setor,
      setor_destino:'finalizado',
      usuario:ME.login,
      tempo_ms:tempoMs,
      confirmado_por:'',
      tempo_confirmacao_ms:0,
      tempo_conf:0,
      entrada_em: campoSetorEntrada(o),
      saida_em: agora,
      confirmado_em: null
    };

    await sb.from('movimentacoes').insert(movPayload);

    toast('Pedido finalizado — material retirado!', 'ok');
    narrar('Pedido ' + o.numero + ' finalizado. Obrigado!');
  }catch(e){
    console.error(e);
    toast(e.message, 'err');
  }finally{
    ov(false);
  }
}

function openNewOrder(){
  el('no-num').value = '';
  el('no-cli').value = '';
  el('no-obs').value = '';
  el('no-prio').value = 'normal';
  openM('m-new-order');

async function createOrder(){
  var num = el('no-num').value.trim();
  var cli = el('no-cli').value.trim();
  var prio = el('no-prio').value;

  if(!num){
    toast('Informe o número do pedido.', 'err');
    return;
  }
  if(!cli){
    toast('Informe o nome do cliente.', 'err');
    return;
  }

  closeM('m-new-order');
  ov(true);

  try{
    var dup = await sb.from('pedidos').select('id').eq('numero', num).neq('status', 'finalizado');
    handleSbError(dup, 'Erro ao validar duplicidade');

    if(dup.data && dup.data.length > 0){
      toast('Já existe um pedido ativo com este número.', 'err');
      return;
    }

    var agora = new Date().toISOString();
    var payload = {
      numero:num,
      setor:'atendimento',
      setor_pendente:'',

      criado_por:ME.login,

      nome_cliente:cli,
      prioridade:prio,
      num_nota:'',
      entrada_em:agora,
      setor_entrada_em:agora
    };

    var res = await sb.from('pedidos').insert(payload);
    handleSbError(res, 'Erro ao criar pedido');
    toast('Pedido #' + num + ' criado — ' + cli, 'ok');
  }catch(e){
    console.error(e);
    toast(e.message, 'err');
  }finally{
    ov(false);
  }

function renderTV(){
  var active = PEDIDOS.filter(o => o.status !== 'finalizado');

  el('tv-body').innerHTML = active
    .sort((a,b) => tsMs(campoEntrada(b)) - tsMs(campoEntrada(a)))
    .map(function(o){
      var totalMs = now() - tsMs(campoEntrada(o));
      var setorMs = o.status === 'aguardando'
        ? now() - tsMs(campoPendente(o))
        : now() - tsMs(campoSetorEntrada(o));

      var rC = totalMs > 45 * 60000 ? 'tv-row-danger' : totalMs > 25 * 60000 ? 'tv-row-warn' : '';
      var tColor = totalMs > 45 * 60000 ? 'var(--danger)' : totalMs > 25 * 60000 ? 'var(--warn)' : 'var(--text)';

      var sl = o.status === 'aguardando'
        ? '<span class="tv-set ' + (SC[o.setor] || 'tag-do') + '">' + (SL[o.setor] || o.setor) + '</span> <span style="font-size:11px;color:var(--corte)">→ ' + (SL[o.setor_pendente] || o.setor_pendente || '') + '</span>'
        : '<span class="tv-set ' + (SC[o.setor] || 'tag-do') + '">' + (SL[o.setor] || o.setor) + '</span>';

      return '<tr class="' + rC + '">' +
        '<td><span class="tv-num">#' + o.numero + '</span></td>' +
        '<td style="font-size:13px">' + (o.nome_cliente || '—') + '</td>' +
        '<td>' + sl + '</td>' +
        '<td><span class="tv-tim">' + fmtTs(setorMs) + '</span></td>' +
        '<td><span class="tv-tim" style="color:' + tColor + '">' + fmtTs(totalMs) + '</span></td>' +
        '<td><span style="font-size:12px;color:var(--muted)">' + (o.status === 'faturado' ? '✓ Faturado' : o.status === 'aguardando' ? 'Aguard. confirmação' : 'Em andamento') + '</span></td>' +
      '</tr>';
    }).join('');

  var done = PEDIDOS.filter(o => o.status === 'finalizado');
  var avgMs = done.length
    ? done.reduce((s,o) => s + (tsMs(campoFinalizado(o)) - tsMs(campoEntrada(o))), 0) / done.length
    : 0;

  el('tv-avg').textContent = done.length ? fmtTs(avgMs) : '--:--';
  el('tv-done').textContent = done.length;
  el('tv-active').textContent = active.length;
  if(el('tv-clock')) el('tv-clock').textContent = fmtClock(new Date());
}

function renderRelatorios(){
  var all = PEDIDOS;
  var done = all.filter(o => o.status === 'finalizado');
  var active = all.filter(o => o.status !== 'finalizado');
  var times = done
    .map(o => tsMs(campoFinalizado(o)) - tsMs(campoEntrada(o)))
    .filter(t => t > 0);

  var avg = times.length ? times.reduce((a,b) => a+b, 0) / times.length : 0;
  var minT = times.length ? Math.min.apply(null, times) : 0;
  var maxT = times.length ? Math.max.apply(null, times) : 0;

  el('kpi-grid').innerHTML = [
    {l:'Total de pedidos',v:all.length,s:'hoje'},
    {l:'Finalizados',v:done.length,s:'hoje'},
    {l:'Em andamento',v:active.filter(o => o.status === 'em_andamento').length,s:'agora'},
    {l:'Aguard. confirmação',v:active.filter(o => o.status === 'aguardando').length,s:'agora'},
    {l:'Tempo médio',v:avg ? fmtT(avg) : '--',s:'por pedido'},
    {l:'Mais rápido',v:minT ? fmtT(minT) : '--',s:''},
    {l:'Mais lento',v:maxT ? fmtT(maxT) : '--',s:''}
  ].map(k => '<div class="kpi"><div class="kl">' + k.l + '</div><div class="kv">' + k.v + '</div><div class="ks">' + k.s + '</div></div>').join('');

  var sA = {}, sC = {};
  MOVS.forEach(function(m){
    var ms = parseInt(m.tempo_ms) || 0;
    if(ms <= 0 || SETORES.indexOf(m.setor_origem) < 0) return;
    sA[m.setor_origem] = (sA[m.setor_origem] || 0) + ms;
    sC[m.setor_origem] = (sC[m.setor_origem] || 0) + 1;
  });

  var maxS = Math.max.apply(null, SETORES.map(s => sC[s] ? (sA[s] / sC[s]) : 0)) || 1;

  el('bars-setor').innerHTML = SETORES.map(function(s){
    var a = sC[s] ? Math.round(sA[s] / sC[s]) : 0;
    return '<div class="br"><span class="bn">' + SL[s] + '</span><div class="bt"><div class="bf" style="width:' + Math.round(a / maxS * 100) + '%;background:' + BC[s] + '"></div></div><span class="bv">' + (a ? fmtT(a) : '--') + ' <span style="color:var(--muted);font-size:10px">(' + (sC[s] || 0) + ')</span></span></div>';
  }).join('');

  if(ME && ME.role === 'admin'){
    var cA = {}, cC = {};
    MOVS.forEach(function(m){
      var ms = parseInt(campoTempoConfirmacao(m)) || 0;
      if(ms <= 0 || SETORES.indexOf(m.setor_destino) < 0) return;
      cA[m.setor_destino] = (cA[m.setor_destino] || 0) + ms;
      cC[m.setor_destino] = (cC[m.setor_destino] || 0) + 1;
    });

    var maxC = Math.max.apply(null, SETORES.map(s => cC[s] ? (cA[s] / cC[s]) : 0)) || 1;

    el('bars-conf').innerHTML = SETORES.map(function(s){
      var a = cC[s] ? Math.round(cA[s] / cC[s]) : 0;
      return '<div class="br"><span class="bn">' + SL[s] + '</span><div class="bt"><div class="bf" style="width:' + Math.round(a / maxC * 100) + '%;background:' + BC[s] + '"></div></div><span class="bv">' + (a ? fmtT(a) : '--') + ' <span style="color:var(--muted);font-size:10px">(' + (cC[s] || 0) + ')</span></span></div>';
    }).join('');

    document.querySelectorAll('#bars-conf, .st.adm-only').forEach(x => x.style.display = '');
  }

  var ranked = all
    .slice()
    .sort(function(a,b){
      var ta = (tsMs(campoFinalizado(a)) || now()) - tsMs(campoEntrada(a));
      var tb = (tsMs(campoFinalizado(b)) || now()) - tsMs(campoEntrada(b));
      return tb - ta;
    })
    .slice(0, 10);

  var sc = {
    finalizado:'var(--atend)',
    faturado:'var(--fat)',
    em_andamento:'var(--muted)',
    aguardando:'var(--corte)'
  };

  el('rank-body').innerHTML = ranked.map(function(o,i){
    var t = (tsMs(campoFinalizado(o)) || now()) - tsMs(campoEntrada(o));
    return '<tr>' +
      '<td style="color:var(--muted)">' + (i+1) + '</td>' +
      '<td style="font-family:var(--font-head);font-size:16px;font-weight:700">#' + o.numero + '</td>' +
      '<td>' + (o.nome_cliente || '—') + '</td>' +
      '<td><span class="tv-set ' + (SC[o.setor] || 'tag-do') + '">' + (SL[o.setor] || o.setor) + '</span></td>' +
      '<td>' + fmtT(t) + '</td>' +
      '<td style="color:' + (sc[o.status] || 'var(--muted)') + ';font-size:12px">' + o.status + '</td>' +
    '</tr>';
  }).join('');
}

var SETORlabel = {
  todos:'Todos',
  atendimento:'Atendimento',
  corte:'Corte',
  separacao:'Separação',
  faturamento:'Faturamento'
};

function renderUsers(users){
  el('users-body').innerHTML = users.map(function(u){
    return '<tr>' +
      '<td>' + u.nome + '</td>' +
      '<td style="color:var(--muted)">' + u.login + '</td>' +
      '<td style="font-size:12px">' + (SETORlabel[u.setor] || u.setor) + '</td>' +
      '<td><span class="bar ' + (u.role === 'admin' ? 'bar-a' : 'bar-o') + '">' + u.role + '</span></td>' +
      '<td><span class="' + (u.ativo ? 'bon' : 'boff') + '">' + (u.ativo ? 'Ativo' : 'Inativo') + '</span></td>' +
      '<td><button class="bmv" onclick="toggleUser(\'' + u.id + '\',' + u.ativo + ',\'' + u.login + '\')">' + (u.ativo ? 'Desativar' : 'Ativar') + '</button></td>' +
    '</tr>';
  }).join('');
}

async function toggleUser(id, ativo, login){
  if(login === 'admin'){
    toast('Não é possível desativar o admin principal.', 'err');
    return;
  }

  ov(true);
  try{
    var res = await sb.from('usuarios').update({ativo:!ativo}).eq('id', id);
    handleSbError(res, 'Erro ao atualizar usuário');
    var u = await fetchUsuarios();
    renderUsers(u);
    toast('Usuário atualizado.', 'ok');
  }catch(e){
    console.error(e);
    toast(e.message, 'err');
  }finally{
    ov(false);
  }
}

async function createUser(){
  var nome = el('nu-nome').value.trim();
  var login = el('nu-login').value.trim();
  var senha = el('nu-senha').value;
  var role = el('nu-role').value;
  var setor = el('nu-setor').value;

  if(!nome || !login || !senha){
    toast('Preencha todos os campos.', 'err');
    return;
  }

  closeM('m-new-user');
  ov(true);

  try{
    var res = await sb.from('usuarios').insert({
      nome:nome,
      login:login,
      senha:senha,
      role:role,
      setor:setor,
      ativo:true
    });
    handleSbError(res, 'Erro ao criar usuário');

    var u = await fetchUsuarios();
    renderUsers(u);
    toast('Usuário criado!', 'ok');
  }catch(e){
    console.error(e);
    toast(e.message, 'err');
  }finally{
    ov(false);
  }
}

async function alterarSenha(){
  var atual = el('s-atual').value;
  var nova = el('s-nova').value;
  var conf = el('s-conf').value;
  el('s-err').textContent = '';

  if(!atual || !nova || !conf){
    el('s-err').textContent = 'Preencha todos os campos.';
    return;
  }
  if(nova !== conf){
    el('s-err').textContent = 'Nova senha e confirmação não coincidem.';
    return;
  }
  if(nova.length < 4){
    el('s-err').textContent = 'Mínimo 4 caracteres.';
    return;
  }

  ov(true);
  try{
    var res = await sb.from('usuarios').select('id').eq('login', ME.login).eq('senha', atual).single();
    if(res.error || !res.data){
      el('s-err').textContent = 'Senha atual incorreta.';
      return;
    }

    var upd = await sb.from('usuarios').update({senha:nova}).eq('id', ME.id);
    handleSbError(upd, 'Erro ao alterar senha');

    toast('Senha alterada!', 'ok');
    ['s-atual','s-nova','s-conf'].forEach(i => el(i).value = '');
  }catch(e){
    console.error(e);
    el('s-err').textContent = e.message;
  }finally{
    ov(false);
  }
}

// ── TV PÚBLICA ──
async function fetchPedidosTVPublica(){
  try{
    var hoje = new Date();
    hoje.setHours(0,0,0,0);

    var res = await sb
      .from('pedidos')
      .select('*')
      .or('entrada_at.gte.' + hoje.toISOString() + ',status.eq.em_andamento,status.eq.aguardando,status.eq.faturado')
      .order('entrada_at', {ascending:false});

    if(res.error){
      res = await sb
        .from('pedidos')
        .select('*')
        .or('entrada_em.gte.' + hoje.toISOString() + ',status.eq.em_andamento,status.eq.aguardando,status.eq.faturado')
        .order('entrada_em', {ascending:false});
    }

    if(!res.error) _tvPub = res.data || [];
  }catch(e){
    console.error(e);
  }
}

function renderTVPub(){
  var active = _tvPub.filter(o => o.status !== 'finalizado');
  if(!el('tvp-body')) return;

  el('tvp-body').innerHTML = active
    .sort((a,b) => tsMs(campoEntrada(b)) - tsMs(campoEntrada(a)))
    .map(function(o){
      var totalMs = now() - tsMs(campoEntrada(o));
      var setorMs = o.status === 'aguardando'
        ? now() - tsMs(campoPendente(o))
        : now() - tsMs(campoSetorEntrada(o));

      var rC = totalMs > 45 * 60000 ? 'tv-row-danger' : totalMs > 25 * 60000 ? 'tv-row-warn' : '';
      var tColor = totalMs > 45 * 60000 ? 'var(--danger)' : totalMs > 25 * 60000 ? 'var(--warn)' : 'var(--text)';
      var sl = '<span class="tv-set ' + (SC[o.setor] || 'tag-do') + '">' + (SL[o.setor] || o.setor) + '</span>';

      return '<tr class="' + rC + '">' +
        '<td><span class="tv-num">#' + o.numero + '</span></td>' +
        '<td style="font-size:13px">' + (o.nome_cliente || '—') + '</td>' +
        '<td>' + sl + '</td>' +
        '<td><span class="tv-tim">' + fmtTs(setorMs) + '</span></td>' +
        '<td><span class="tv-tim" style="color:' + tColor + '">' + fmtTs(totalMs) + '</span></td>' +
        '<td><span style="font-size:12px;color:var(--muted)">' + (o.status === 'faturado' ? '✓ Faturado' : o.status === 'aguardando' ? 'Aguard. confirmação' : 'Em andamento') + '</span></td>' +
      '</tr>';
    }).join('');

  var done = _tvPub.filter(o => o.status === 'finalizado');
  var avgMs = done.length
    ? done.reduce((s,o) => s + (tsMs(campoFinalizado(o)) - tsMs(campoEntrada(o))), 0) / done.length
    : 0;

  if(el('tvp-avg')) el('tvp-avg').textContent = done.length ? fmtTs(avgMs) : '--:--';
  if(el('tvp-done')) el('tvp-done').textContent = done.length;
  if(el('tvp-active')) el('tvp-active').textContent = active.length;
}

function iniciarTVPublica(){
  if(_tvPubStarted) return;
  _tvPubStarted = true;

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  el('screen-tv-pub').style.display = 'block';

  setInterval(function(){
    if(el('tvp-clock')) el('tvp-clock').textContent = fmtClock(new Date());
    renderTVPub();
  }, 1000);

  fetchPedidosTVPublica().then(renderTVPub);
  setInterval(async function(){
    await fetchPedidosTVPublica();
    renderTVPub();
  }, 3000);
}

setPanelDate();
if(el('tv-clock')) el('tv-clock').textContent = fmtClock(new Date());

if(window.location.search.indexOf('tv=1') >= 0){
  iniciarTVPublica();
}
